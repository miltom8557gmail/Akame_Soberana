name: 🔱 AKAME APK FORGE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando DNA (Checkout)
        uses: actions/checkout@v3

      - name: ☕ Configurando JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: ⚙️ Concedendo Permissão ao Gradle
        run: chmod +x gradlew

      - name: 🔨 Compilando APK (Release)
        run: ./gradlew assembleDebug

      - name: 📦 Disponibilizando Artefato (APK)
        uses: actions/upload-artifact@v3
        with:
          name: Akame_Soberana_v16.0
          path: app/build/outputs/apk/debug/app-debug.apk
