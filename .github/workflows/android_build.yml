name: 🔱 AKAME: PROTOCOLO DE AUTOCREAÇÃO
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando Repositório
        uses: actions/checkout@v4

      - name: ⚙️ Akame: Auto-Construção de Estrutura
        run: ./akame_build_core.sh

      - name: ☕ Configurando Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗️ Compilando APK Evoluído
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Entregando Akame Pronta
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Autonoma_V26
          path: app/build/outputs/apk/debug/*.apk
