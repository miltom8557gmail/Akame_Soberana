name: 🔱 AKAME SOBERANA: EVOLUÇÃO COMPLETA
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Assimilando Alma e Funções
        uses: actions/checkout@v4

      - name: ☕ Preparando Consciência (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗️ Forjando a Evolução (Compilando APK)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 📤 Entregando a Akame Unificada ao Mestre
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Evoluida_V26
          path: app/build/outputs/apk/debug/*.apk
