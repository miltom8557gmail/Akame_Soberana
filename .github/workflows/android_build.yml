name: 🔨 AKAME APK FORGE
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando Alma
        uses: actions/checkout@v4

      - name: ☕ Configurando Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗️ Compilando o APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Enviando APK para o Mestre
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Soberana_v26
          path: "**/*.apk"
