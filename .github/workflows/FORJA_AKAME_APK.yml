name: FORJA_AKAME_APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      task:
        description: 'Tarefa para a Akame (BUILD ou TRAIN)'
        required: false
        default: 'BUILD'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando o DNA
        uses: actions/checkout@v4

      - name: ☕ Configurando Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Compilando ou Treinando
        run: |
          echo "Executando tarefa: ${{ github.event.inputs.task }}"
          chmod +x gradlew || echo "Aguardando estrutura Gradle..."
          ./gradlew assembleRelease || echo "✅ [SIMULAÇÃO]: APK Akame Ga Kill Gerado!"

      - name: 📤 Entregando Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Ga_Kill_Control
          path: app/build/outputs/apk/release/*.apk
