name: 🔱 Akame Omni - Supabase Test
on: [push, workflow_dispatch]

jobs:
  check_memory:
    runs-on: ubuntu-latest
    steps:
      - name: ⚡ Handshake com Supabase
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          "https://vzoqzjpvswpwyixqsqnz.supabase.co/rest/v1/")
          
          if [ $RESPONSE -eq 200 ] || [ $RESPONSE -eq 204 ]; then
            echo "✅ MEMÓRIA ALCANÇÁVEL: HTTP $RESPONSE"
          else
            echo "❌ BLOQUEIO NA NUVEM: HTTP $RESPONSE"
            exit 1
          fi
