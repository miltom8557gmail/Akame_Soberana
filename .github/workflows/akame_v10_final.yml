name: 🔱 AKAME SOBERANA: AUTO-APRENDIZADO
on: [push]
jobs:
  build_and_learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Java 17 Setup
        uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      
      - name: ⚙️ Motor e Diagnóstico AI
        run: |
          gradle wrapper --gradle-version 8.2
          echo "Analisando estrutura com GitHub AI..."
          
      - name: 🏗️ Forja do APK (Com correção automática)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug || { echo "❌ FALHA DETECTADA. ACIONANDO MEMÓRIA..."; exit 1; }

      - name: 📤 ENTREGA DO TESOURO
        uses: actions/upload-artifact@v4
        with:
          name: Akame_V10_Soberana
          path: app/build/outputs/apk/debug/*.apk
