name: 🔱 AKAME: ENTREGA DO APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando Alma
        uses: actions/checkout@v4

      - name: ⚙️ Auto-Construção
        run: |
          chmod +x akame_build_core.sh
          ./akame_build_core.sh

      - name: ☕ Configurando Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗️ Compilando APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 ENTREGAR APK AO MESTRE
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Pronta_Instalar
          path: app/build/outputs/apk/debug/*.apk
