name: 🔱 AKAME SOBERANA (Criação e Entrega)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  akame_creator:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Sincronia de DNA
        uses: actions/checkout@v4

      - name: 🧠 Akame: Analisar e Atualizar Ambiente
        run: |
          echo "Auditando requisitos do sistema..."
          sudo apt-get update
          sudo apt-get install -y build-essential curl file git
          # Garante que o Gradle tenha permissão de execução em qualquer circunstância
          chmod +x gradlew || echo "Tentando recuperar gradlew..."

      - name: ☕ Java 17 (Requisito de Base)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Akame: Criação e Compilação
        run: |
          # Se o build falhar, a Akame busca a causa nos logs
          ./gradlew assembleDebug --stacktrace || {
            echo "❌ Erro detectado. Akame analisando dependências..."
            ./gradlew --version
            exit 1
          }

      - name: 📦 Entrega do Artefato
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Soberana_vFinal
          path: "**/build/outputs/apk/debug/*.apk"
