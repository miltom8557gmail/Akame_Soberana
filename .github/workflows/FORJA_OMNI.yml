name: 🔱 FORJA OMNI (Auto-Cura Ativa)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Akame: Tentativa de Compilação
        id: compile
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace || {
            echo "❌ ERRO DETECTADO!"
            exit 1
          }

      - name: 📦 Entrega de Sucesso
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Soberana_Final
          path: "**/build/outputs/apk/debug/*.apk"
