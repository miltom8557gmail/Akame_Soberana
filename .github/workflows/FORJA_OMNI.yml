name: 🔱 FORJA OMNI (Compilação e Entrega)
on: [push, workflow_dispatch]
jobs:
  build_all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Configurar Java (Para APKs)
        uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - name: 🔨 Build APK (Android)
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          fi
      - name: 🌐 Deploy Website (GitHub Pages)
        if: hashFiles('index.html') != ''
        uses: JamesIves/github-pages-deploy-action@v4
        with: {folder: '.', branch: 'gh-pages'}
      - name: 📦 Entrega de Artefatos
        uses: actions/upload-artifact@v4
        with: {name: 'Akame_Output', path: '**/*.apk'}
