name: 🔱 AKAME SOBERANA

run-name: 🧬 Run:[${{ github.run_number }}] - 🕒 ${{ github.event.head_commit.message || 'Manual_Forja' }}

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🛠️ Akame: Processamento e Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace || echo "❌ Falha na compilação. Notificando Nexus..."
          
      - name: 📦 Entrega do Artefato
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Akame_v${{ github.run_number }}
          path: "app/build/outputs/apk/debug/*.apk"
