name: 🔱 AKAME OMNI-FORGE V35

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Clonando DNA Akame
        uses: actions/checkout@v4

      - name: ☕ Configurando Java 17 (Estabilidade)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Preparando Martelo (Gradle)
        run: chmod +x gradlew

      - name: 🔨 Forjando APK Soberano (Debug)
        run: ./gradlew assembleDebug --stacktrace

      - name: 📦 Entregando Artefato
        uses: actions/upload-artifact@v4
        with:
          name: Akame_Soberana_V35
          path: app/build/outputs/apk/debug/app-debug.apk
